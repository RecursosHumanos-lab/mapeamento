// ─── STORAGE SHIM (localStorage) ─────────────────────────────────────────────
window.storage = {
  get: async (key) => {
    const v = localStorage.getItem(key);
    return v ? { key, value: v } : null;
  },
  set: async (key, value) => {
    localStorage.setItem(key, value);
    return { key, value };
  },
  delete: async (key) => {
    localStorage.removeItem(key);
    return { key, deleted: true };
  },
  list: async (prefix) => {
    const keys = Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix));
    return { keys };
  }
};

// ─── STORAGE ─────────────────────────────────────────────────────────────────
async function saveSubmission(data) {
  try {
    let list = [];
    try { const r = await window.storage.get("submissions"); if(r) list = JSON.parse(r.value); } catch{}
    const idx = list.findIndex(s => s.id === data.id);
    if (idx >= 0) list[idx] = data; else list.push(data);
    await window.storage.set("submissions", JSON.stringify(list));
    return true;
  } catch { return false; }
}
async function loadSubmissions() {
  try {
    const r = await window.storage.get("submissions");
    return r ? JSON.parse(r.value) : [];
  } catch { return []; }
}
async function deleteSubmission(id) {
  try {
    let list = [];
    try { const r = await window.storage.get("submissions"); if(r) list = JSON.parse(r.value); } catch{}
    await window.storage.set("submissions", JSON.stringify(list.filter(s => s.id !== id)));
    return true;
  } catch { return false; }
}

// ─── CBO API ─────────────────────────────────────────────────────────────────
async function fetchCBO(cargo) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"claude-sonnet-4-20250514", max_tokens:1000,
      messages:[{ role:"user", content:`Você é especialista em gestão de pessoas e CBO brasileiro. Liste exatamente 8 atribuições típicas e genéricas do cargo "${cargo}" conforme o CBO (Classificação Brasileira de Ocupações). Responda APENAS com uma lista numerada, sem introdução, sem conclusão. Cada item deve ter entre 8 e 18 palavras.` }]
    })
  });
  const d = await res.json();
  return d.content?.[0]?.text || "";
}

// ─── STEP INDICATOR ──────────────────────────────────────────────────────────
function StepBar({ step, total, labels }) {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:0, marginBottom:28 }}>
      {labels.map((l, i) => (
        <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center" }}>
          <div style={{ display:"flex", alignItems:"center", width:"100%" }}>
            {i > 0 && <div style={{ flex:1, height:2, background: i<=step?"#2563EB":"#e2e8f0" }} />}
            <div style={{
              width:32, height:32, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center",
              background: i<step?"#2563EB":i===step?"#2563EB":"#e2e8f0",
              color: i<=step?"#fff":"#9ca3af", fontWeight:700, fontSize:13, flexShrink:0
            }}>
              {i < step ? "✓" : i+1}
            </div>
            {i < labels.length-1 && <div style={{ flex:1, height:2, background: i<step?"#2563EB":"#e2e8f0" }} />}
          </div>
          <span style={{ fontSize:11, color: i===step?"#2563EB":"#9ca3af", marginTop:4, fontWeight: i===step?600:400, textAlign:"center" }}>{l}</span>
        </div>
      ))}
    </div>
  );
}

  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const lookupCBO = async () => {
    if (!form.cargo) return;
    setCboLoading(true);
    try {
      const t = await fetchCBO(form.cargo);
      setCboText(t);
      set("atrib_cargo", t);
    } catch { setCboText("Não foi possível buscar. Preencha manualmente."); }
    setCboLoading(false);
  };

  const validate = () => {
    const e = {};
    if (step === 0) {
      if (!form.nome.trim()) e.nome = "Obrigatório";
      if (!form.cargo.trim()) e.cargo = "Obrigatório";
      if (!form.admissao) e.admissao = "Obrigatório";
      if (!form.departamento) e.departamento = "Obrigatório";

    if (step === 1) {
      if (!form.atrib_cargo.trim()) e.atrib_cargo = "Obrigatório";
    }
    if (step === 2) {
      BLOCO1.forEach(q => { if (!form[q.id]?.trim()) e[q.id] = "Obrigatório"; });
    }
    if (step === 3) {
      BLOCO2.forEach(q => { if (!form[q.id]?.trim()) e[q.id] = "Obrigatório"; });
    }
    if (step === 4) {
      BLOCO3.forEach(q => { if (!form[q.id]?.trim()) e[q.id] = "Obrigatório"; });
    }
    setErrors(e);
    return Object.keys(e).length === 0;

              </div>
              {BLOCO2.map(q => (
                <Field key={q.id} k={q.id} label={q.label + " *"}>
                  <textarea style={{ ...S.textarea, borderColor: errors[q.id]?"#dc2626":"#e2e8f0" }}
                    value={form[q.id]} onChange={e=>set(q.id,e.target.value)} placeholder={q.ph} />
                </Field>
              ))}
            </div>
          )}

          {/* STEP 4: BLOCO 3 */}
          {step === 4 && (
            <div>
              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:20 }}>
                <div style={{ background:"#d1fae5", color:"#065f46", borderRadius:8, padding:"4px 12px", fontWeight:700, fontSize:13 }}>BLOCO 3</div>
                <h2 style={{ fontSize:20, fontWeight:700, color:"#0F2356", margin:0 }}>Perfil e Carreira</h2>
              </div>
              {BLOCO3.map(q => (
                <Field key={q.id} k={q.id} label={q.label + " *"}>
                  {q.type === "select" ? (
                    <select style={{ ...S.input, borderColor: errors[q.id]?"#dc2626":"#e2e8f0" }} value={form[q.id]} onChange={e=>set(q.id,e.target.value)}>
                      <option value="">Selecione...</option>
                      {ESCOLARIDADE.map(x => <option key={x}>{x}</option>)}
                    </select>
                  ) : (
                    <textarea style={{ ...S.textarea, borderColor: errors[q.id]?"#dc2626":"#e2e8f0" }}
                      value={form[q.id]} onChange={e=>set(q.id,e.target.value)} placeholder={q.ph} />
                  )}
                </Field>
              ))}
            </div>
          )}

          {/* STEP 5: REVISÃO */}
          {step === 5 && (
            <div>
              <h2 style={{ fontSize:20, fontWeight:700, color:"#0F2356", marginBottom:20 }}>Revisão e Confirmação</h2>
              <div style={{ background:"#f8fafc", border:"1px solid #e2e8f0", borderRadius:10, padding:20, marginBottom:20 }}>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, fontSize:14 }}>
                  {[["Nome",form.nome],["Cargo",form.cargo],["Admissão",form.admissao],["Departamento",form.departamento],["Entrevistador",form.entrevistador],["Data entrevista",form.data_entrevista]].map(([k,v]) =>
                    <div key={k}><span style={{ color:"#6b7280" }}>{k}:</span> <strong>{v||"—"}</strong></div>
                  )}
                </div>
              </div>
              <div style={{ background:"#eff6ff", border:"1px solid #bfdbfe", borderRadius:10, padding:20, marginBottom:20 }}>
                <p style={{ fontSize:14, color:"#1e40af", margin:0 }}>✅ Todos os 3 blocos preenchidos · {[...BLOCO1,...BLOCO2,...BLOCO3].filter(q=>form[q.id]?.trim()).length}/15 perguntas respondidas</p>
              </div>
              <p style={{ color:"#6b7280", fontSize:14 }}>Revise as informações acima. Ao confirmar, sua ficha será enviada ao RH e não poderá ser alterada.</p>
            </div>
          )}

          {/* NAVIGATION */}
          <div style={{ display:"flex", justifyContent:"space-between", marginTop:28, paddingTop:20, borderTop:"1px solid #f0f0f0" }}>
            <button style={S.btn("ghost")} onClick={step===0?onBack:prev}>{step===0?"← Início":"← Anterior"}</button>
            {step < 5
              ? <button style={S.btn()} onClick={next}>Próximo →</button>
              : <button style={{ ...S.btn("success"), opacity:saving?0.7:1 }} onClick={submit} disabled={saving}>{saving?"Enviando...":"✅ Confirmar e Enviar"}</button>
            }
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── HR LOGIN ─────────────────────────────────────────────────────────────────
function HRLogin({ onLogin, onBack }) {
  const [pass, setPass] = useState("");
  const [err, setErr] = useState("");
  const attempt = () => {
    if (pass === HR_PASS) { onLogin(); setErr(""); }
    else setErr("Senha incorreta. Tente novamente.");
  };
  return (
    <div style={{ minHeight:"100vh", background:"#0F2356", display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ ...S.card, maxWidth:400, width:"100%", textAlign:"center" }}>
        <div style={{ fontSize:48, marginBottom:16 }}>🔒</div>
        <h2 style={{ fontSize:22, fontWeight:700, color:"#0F2356", margin:"0 0 8px" }}>Acesso ao Painel RH</h2>
        <p style={{ color:"#6b7280", fontSize:14, marginBottom:24 }}>Digite a senha para acessar o painel administrativo</p>
        <input type="password" style={{ ...S.input, textAlign:"center", fontSize:16, borderColor:err?"#dc2626":"#e2e8f0", marginBottom:8 }}
          value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&attempt()} placeholder="Senha do RH" />
        {err && <p style={{ color:"#dc2626", fontSize:13, marginBottom:8 }}>{err}</p>}
        <div style={{ display:"flex", gap:12, marginTop:8 }}>
          <button style={{ ...S.btn("ghost"), flex:1 }} onClick={onBack}>← Voltar</button>
          <button style={{ ...S.btn(), flex:1 }} onClick={attempt}>Entrar</button>
        </div>
      </div>
    </div>
  );
}

// ─── HR DASHBOARD ─────────────────────────────────────────────────────────────
function HRDashboard({ onBack }) {
  const [tab, setTab] = useState("overview");
  const [subs, setSubs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selected, setSelected] = useState(null);
  const [enq, setEnq] = useState({ nome:"", cargo:"", nivel:"", salAtual:"", obs:"" });
  const [enqResult, setEnqResult] = useState(null);
  const [savedEnqs, setSavedEnqs] = useState([]);
  const [aiLoading, setAiLoading] = useState(false);
  const [aiCache, setAiCache] = useState({});
  const [showNewCargo, setShowNewCargo] = useState(false);
  const [newCargo, setNewCargo] = useState({ nome:"", cbo:"", grupo:"1", nivelLabel:"I/II/III", n1:"", n2:"", n3:"", area:"ADM", cct:"", obs:"" });
  const [customCargos, setCustomCargos] = useState([]);
  const [ncSaving, setNcSaving] = useState(false);

  const refresh = useCallback(async () => {
    setLoading(true);
    const d = await loadSubmissions();
    setSubs(d);
    try {
      const r = await window.storage.get("enquadramentos");
      if (r) setSavedEnqs(JSON.parse(r.value));
    } catch {}
    try {
      const r = await window.storage.get("custom_cargos");
      if (r) setCustomCargos(JSON.parse(r.value));
    } catch {}
    setLoading(false);
  }, []);

  useEffect(() => { refresh(); }, [refresh]);

  const calcEnq = () => {
    const entry = ALL_CARGOS.find(c => c.cargo.toLowerCase() === enq.cargo.toLowerCase());
    if (!entry) { setEnqResult({ error: `Cargo "${enq.cargo}" não encontrado na tabela salarial.` }); return; }
    const faixaVal = enq.nivel ? entry.faixas[enq.nivel] : null;
    const salAtual = parseFloat(String(enq.salAtual).replace(",","."));
    const minFaixa = Math.min(...Object.values(entry.faixas));
    const maxFaixa = Math.max(...Object.values(entry.faixas));
    let situacao = "—", cor = "gray";
    if (!isNaN(salAtual) && faixaVal) {
      if (salAtual < faixaVal * 0.97) { situacao = "🔴 Abaixo da faixa — reajuste recomendado"; cor = "red"; }
      else if (salAtual > faixaVal * 1.03) { situacao = "🟡 Acima da faixa — avaliar congelamento"; cor = "yellow"; }
      else { situacao = "🟢 Dentro da faixa — OK"; cor = "green"; }
    }
    setEnqResult({ entry, faixaVal, salAtual, situacao, cor, minFaixa, maxFaixa });
  };

  const saveEnq = async () => {
    const item = { ...enq, ...enqResult, id: Date.now(), dt: new Date().toLocaleDateString("pt-BR") };
    const updated = [...savedEnqs, item];
    setSavedEnqs(updated);
    await window.storage.set("enquadramentos", JSON.stringify(updated));
  };

  const deleteEnqItem = async (id) => {
    const updated = savedEnqs.filter(e => e.id !== id);
    setSavedEnqs(updated);
    await window.storage.set("enquadramentos", JSON.stringify(updated));
  };

  const delSub = async (id) => {
    await deleteSubmission(id);
    setSelected(null);
    refresh();
  };

  const allCargosWithCustom = [...ALL_CARGOS, ...customCargos];

  const saveCustomCargo = async () => {
    setNcSaving(true);
    const item = {
      g: parseInt(newCargo.grupo)||1,
      cargo: newCargo.nome.trim(),
      cbo: newCargo.cbo,
      area: newCargo.area,
      cct: newCargo.cct,
      obs: newCargo.obs,
      custom: true,
      faixas: {
        [newCargo.nivelLabel.split("/")[0]]: parseFloat(newCargo.n1)||0,
        [newCargo.nivelLabel.split("/")[1]]: parseFloat(newCargo.n2)||0,
        [newCargo.nivelLabel.split("/")[2]]: parseFloat(newCargo.n3)||0,
      }
    };
    const updated = [...customCargos, item];
    setCustomCargos(updated);
    await window.storage.set("custom_cargos", JSON.stringify(updated));
    setNewCargo({ nome:"", cbo:"", grupo:"1", nivelLabel:"I/II/III", n1:"", n2:"", n3:"", area:"ADM", cct:"", obs:"" });
    setShowNewCargo(false);
    setNcSaving(false);
    alert(`Cargo "${item.cargo}" cadastrado com sucesso!`);
  };

  const runAIAnalysis = async (s) => {
    if (aiCache[s.id]) return;
    setAiLoading(true);
    const allCargoNames = allCargosWithCustom.map(c => c.cargo).join(", ");
    const prompt = `Você é um especialista em gestão de pessoas, CBO (Classificação Brasileira de Ocupações) e plano de cargos e salários. Analise a ficha de mapeamento abaixo e faça:

ATRIBUIÇÕES DO CARGO (conforme CBO/colaborador):
${s.atrib_cargo||"não informado"}

ATRIBUIÇÕES EXTRAS (além do cargo):
${s.atrib_extra||"nenhuma"}

BLOCO 3 - PERFIL:

- O que mais gosta: ${s.b3q4||"—"}
- Aspirações de carreira: ${s.b3q5||"—"}`;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:2000, messages:[{ role:"user", content: prompt }] })
      });
      const data = await res.json();

                  <div style={{ fontSize:32, marginBottom:8 }}>{c.icon}</div>
                  <div style={{ fontSize:32, fontWeight:800, color:"#2563EB" }}>{c.val}</div>
                  <div style={{ fontSize:13, color:"#6b7280" }}>{c.label}</div>
                </div>
              ))}
            </div>
            <div style={S.card}>
              <h3 style={{ fontSize:15, fontWeight:700, color:"#0F2356", marginBottom:16 }}>📊 Distribuição por Escolaridade</h3>
              {(() => {
                const counts = subs.reduce((a,s) => { if(s.b3q1) a[s.b3q1]=(a[s.b3q1]||0)+1; return a; }, {});
                return Object.keys(counts).length === 0
                  ? <p style={{ color:"#9ca3af", fontSize:13 }}>Sem dados ainda.</p>
                  : Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([k,v]) => (
                    <div key={k} style={{ marginBottom:10 }}>
                      <div style={{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:4 }}>
                        <span>{k}</span><span style={{ fontWeight:700, color:"#2563EB" }}>{v} ({Math.round(v/subs.length*100)}%)</span>
                      </div>
                      <div style={{ background:"#e2e8f0", borderRadius:999, height:8 }}>
                        <div style={{ width:`${v/subs.length*100}%`, height:"100%", background:"#2563EB", borderRadius:999 }} />
                      </div>
                    </div>
                  ));
              })()}
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
              <div style={S.card}>
                <h3 style={{ fontSize:15, fontWeight:700, color:"#0F2356", marginBottom:16 }}>🏢 Fichas por Departamento</h3>
                {Object.entries(depStats).sort((a,b)=>b[1]-a[1]).map(([dep,cnt]) => (
                  <div key={dep} style={{ display:"flex", justifyContent:"space-between", padding:"6px 0", borderBottom:"1px solid #f0f0f0", fontSize:13 }}>
                    <span>{dep}</span><span style={S.tag("blue")}>{cnt}</span>
                  </div>
                ))}
                {Object.keys(depStats).length===0 && <p style={{ color:"#9ca3af", fontSize:13 }}>Sem dados ainda.</p>}
              </div>
              <div style={S.card}>
                <h3 style={{ fontSize:15, fontWeight:700, color:"#0F2356", marginBottom:16 }}>💰 Situação dos Enquadramentos</h3>
                {(() => {
                  const ok = savedEnqs.filter(e=>e.cor==="green").length;
                  const acima = savedEnqs.filter(e=>e.cor==="yellow").length;
                  const abaixo = savedEnqs.filter(e=>e.cor==="red").length;
                  return savedEnqs.length === 0
                    ? <p style={{ color:"#9ca3af", fontSize:13 }}>Nenhum enquadramento realizado.</p>
                    : <div>
                        {[["🟢 Dentro da faixa",ok,"green"],["🟡 Acima da faixa",acima,"yellow"],["🔴 Abaixo da faixa",abaixo,"red"]].map(([label,val,cor]) => (
                          <div key={cor} style={{ display:"flex", justifyContent:"space-between", padding:"10px 0", borderBottom:"1px solid #f0f0f0" }}>
                            <span style={{ fontSize:14 }}>{label}</span>
                            <span style={{ ...S.tag(cor), fontSize:14 }}>{val}</span>
                          </div>
                        ))}
                      </div>;
                })()}
              </div>
            </div>
            <div style={S.card}>
              <h3 style={{ fontSize:15, fontWeight:700, color:"#0F2356", marginBottom:16 }}>📋 Todas as Fichas Recebidas</h3>
              <table style={{ width:"100%", fontSize:13, borderCollapse:"collapse" }}>
                <thead><tr style={{ background:"#f8fafc" }}>
                  {["Nome","Cargo","Departamento","Admissão","Enviado em"].map(h =>
                    <th key={h} style={{ padding:"8px 12px", textAlign:"left", fontWeight:600, borderBottom:"1px solid #e2e8f0" }}>{h}</th>
                  )}
                </tr></thead>
                <tbody>
                  {subs.map(s => (
                    <tr key={s.id} style={{ borderBottom:"1px solid #f0f0f0" }}>
                      <td style={{ padding:"8px 12px", fontWeight:500 }}>{s.nome}</td>
                      <td style={{ padding:"8px 12px", color:"#6b7280" }}>{s.cargo}</td>
                      <td style={{ padding:"8px 12px", color:"#6b7280" }}>{s.departamento}</td>
                      <td style={{ padding:"8px 12px", color:"#6b7280" }}>{s.admissao}</td>
                      <td style={{ padding:"8px 12px", color:"#6b7280" }}>{new Date(s.submetido_em).toLocaleDateString("pt-BR")}</td>
                    </tr>
                  ))}
                  {subs.length === 0 && <tr><td colSpan={5} style={{ textAlign:"center", color:"#9ca3af", padding:"2rem" }}>Nenhuma ficha recebida</td></tr>}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("home");
  return (
    <div style={S.app}>
      {screen === "home" && <HomeScreen onEmployee={()=>setScreen("employee")} onHR={()=>setScreen("hr-login")} />}
      {screen === "employee" && <EmployeeForm onBack={()=>setScreen("home")} />}
      {screen === "hr-login" && <HRLogin onLogin={()=>setScreen("hr-dashboard")} onBack={()=>setScreen("home")} />}
      {screen === "hr-dashboard" && <HRDashboard onBack={()=>setScreen("home")} />}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
