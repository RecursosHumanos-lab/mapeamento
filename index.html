<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapeamento de Cargos & Salários 2025/2026</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f9fafb; color: #111827; }
    .card { background: white; border-radius: 12px; padding: 2rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 800px; margin: 2rem auto; }
    .input { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; margin-top: 6px; margin-bottom: 16px; font-size: 16px; }
    .btn { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; width: 100%; transition: 0.2s; }
    .btn-primary { background: #0F2356; color: white; }
    .btn-primary:hover { background: #1e3a8a; }
    label { font-weight: 600; color: #374151; font-size: 14px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- COMPONENTES DE INPUT ESTÁVEIS (CORRIGEM O ERRO DE DIGITAÇÃO) ---
    const StableInput = ({ label, value, onChange, placeholder }) => (
      <div style={{ marginBottom: '16px' }}>
        <label>{label}</label>
        <input 
          className="input" 
          type="text" 
          value={value} 
          onChange={(e) => onChange(e.target.value)} 
          placeholder={placeholder}
        />
      </div>
    );

    const StableTextarea = ({ label, value, onChange, placeholder }) => (
      <div style={{ marginBottom: '16px' }}>
        <label>{label}</label>
        <textarea 
          className="input" 
          style={{ minHeight: '100px', resize: 'vertical' }}
          value={value} 
          onChange={(e) => onChange(e.target.value)} 
          placeholder={placeholder}
        />
      </div>
    );

    // --- APLICAÇÃO PRINCIPAL COM O SEU LAYOUT ORIGINAL ---
    function App() {
      const [screen, setScreen] = useState('home');
      const [formData, setFormData] = useState({ nome: '', cargo: '', depto: '', admissao: '', atividades: '' });
      const [submissions, setSubmissions] = useState([]);
      const [pass, setPass] = useState('');

      // Recuperar dados salvos
      useEffect(() => {
        const saved = localStorage.getItem('mapeamento_submissions');
        if (saved) setSubmissions(JSON.parse(saved));
      }, []);

      const handleSave = () => {
        const novo = { ...formData, id: Date.now(), submetido_em: new Date().toISOString() };
        const lista = [...submissions, novo];
        setSubmissions(lista);
        localStorage.setItem('mapeamento_submissions', JSON.stringify(lista));
        alert("Ficha enviada com sucesso!");
        setScreen('home');
      };

      // TELA INICIAL (LAYOUT ORIGINAL)
      if (screen === 'home') return (
        <div style={{ textAlign: 'center', marginTop: '100px' }}>
          <h1 style={{ color: '#0F2356', fontSize: '32px', marginBottom: '10px' }}>Mapeamento de Cargos & Salários</h1>
          <p style={{ color: '#6b7280', marginBottom: '40px' }}>Gestão Estratégica 2025/2026</p>
          <div style={{ display: 'flex', gap: '20px', justifyContent: 'center', maxWidth: '500px', margin: '0 auto' }}>
            <button className="btn btn-primary" onClick={() => setScreen('form')}>Sou Colaborador</button>
            <button className="btn" style={{ background: '#64748b', color: 'white' }} onClick={() => setScreen('login')}>Acesso RH</button>
          </div>
        </div>
      );

      // FORMULÁRIO (COM BUSCA DE CBO E CORREÇÃO DE FOCO)
      if (screen === 'form') return (
        <div className="card">
          <button onClick={() => setScreen('home')} style={{ color: '#2563eb', border: 'none', background: 'none', cursor: 'pointer', marginBottom: '1rem' }}>← Voltar ao início</button>
          <h2 style={{ marginBottom: '1.5rem' }}>Ficha do Colaborador</h2>
          
          <StableInput label="Nome Completo" value={formData.nome} onChange={(v) => setFormData({...formData, nome: v})} />
          
          <div style={{ marginBottom: '16px' }}>
            <label>Cargo Atual (Busca CBO)</label>
            <input 
              className="input" 
              list="cbo-list" 
              value={formData.cargo} 
              onChange={(e) => setFormData({...formData, cargo: e.target.value})} 
              placeholder="Digite para buscar cargo..."
            />
            <datalist id="cbo-list">
              <option value="Analista de RH" />
              <option value="Auxiliar Administrativo" />
              <option value="Gerente Financeiro" />
              <option value="Engenheiro Civil" />
              <option value="Encarregado de Obras" />
            </datalist>
          </div>

          <div style={{ marginBottom: '16px' }}>
            <label>Departamento</label>
            <select className="input" value={formData.depto} onChange={(e) => setFormData({...formData, depto: e.target.value})}>
              <option value="">Selecione...</option>
              <option value="Administrativo">Administrativo</option>
              <option value="Financeiro">Financeiro</option>
              <option value="Obras">Obras</option>
              <option value="RH">Recursos Humanos</option>
            </select>
          </div>

          <StableTextarea 
            label="Descreva detalhadamente as suas atividades diárias" 
            value={formData.atividades} 
            onChange={(v) => setFormData({...formData, atividades: v})} 
            placeholder="Ex: Elaboração de relatórios, conferência de notas..."
          />

          <button className="btn btn-primary" onClick={handleSave}>Enviar Ficha para o RH</button>
        </div>
      );

      // LOGIN RH
      if (screen === 'login') return (
        <div className="card" style={{ maxWidth: '400px' }}>
          <h2>Acesso Restrito</h2>
          <input className="input" type="password" placeholder="Senha RH" value={pass} onChange={e => setPass(e.target.value)} />
          <button className="btn btn-primary" onClick={() => pass === 'RH2026' ? setScreen('dash') : alert("Incorreta")}>Entrar</button>
          <button className="btn" style={{ background: 'none', color: '#64748b', marginTop: '10px' }} onClick={() => setScreen('home')}>Cancelar</button>
        </div>
      );

      // DASHBOARD RH (COM TABELAS SALARIAIS)
      if (screen === 'dash') return (
        <div className="card" style={{ maxWidth: '1000px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '20px' }}>
            <h2>Painel de Gestão RH</h2>
            <button className="btn" style={{ width: 'auto', background: '#ef4444', color: 'white' }} onClick={() => setScreen('home')}>Sair</button>
          </div>
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse' }}>
              <thead>
                <tr style={{ background: '#f3f4f6' }}>
                  <th style={{ padding: '12px', borderBottom: '2px solid #e5e7eb' }}>Nome</th>
                  <th style={{ padding: '12px', borderBottom: '2px solid #e5e7eb' }}>Cargo</th>
                  <th style={{ padding: '12px', borderBottom: '2px solid #e5e7eb' }}>Depto</th>
                </tr>
              </thead>
              <tbody>
                {submissions.map(s => (
                  <tr key={s.id}>
                    <td style={{ padding: '12px', borderBottom: '1px solid #e5e7eb' }}>{s.nome}</td>
                    <td style={{ padding: '12px', borderBottom: '1px solid #e5e7eb' }}>{s.cargo}</td>
                    <td style={{ padding: '12px', borderBottom: '1px solid #e5e7eb' }}>{s.depto}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
